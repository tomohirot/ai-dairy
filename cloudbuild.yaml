steps:
  # Dockerイメージをビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sales-daily-report:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/sales-daily-report:latest'
      - '.'

  # Dockerイメージをプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/sales-daily-report:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/sales-daily-report:latest'

  # Cloud Runにデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sales-daily-report'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sales-daily-report:latest'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:asia-northeast1:sales-daily-report-db'

# イメージをContainer Registryに保存
images:
  - 'gcr.io/$PROJECT_ID/sales-daily-report:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/sales-daily-report:latest'

# タイムアウト設定
timeout: 1200s

# ビルドログの設定
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'
